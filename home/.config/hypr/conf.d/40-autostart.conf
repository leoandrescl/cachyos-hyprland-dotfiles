# Keep session environment in sync for user/systemd services.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DESKTOP_SESSION

# Workaround: re-apply monitor layout after login race.
exec-once = ~/.config/hypr/scripts/apply-monitors.sh

# Core desktop services.
exec-once = waybar -c $HOME/.config/waybar/config -s $HOME/.config/waybar/style.css
exec-once = dunst
exec-once = ~/.config/hypr/scripts/start-services.sh

# Workspace-aware app startup.
exec-once = ~/.config/hypr/scripts/start-apps.sh
