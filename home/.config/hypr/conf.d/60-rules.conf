# NOTE:
# Workspace-to-monitor mapping is defined only in 10-monitors.conf.
# Do not duplicate those rules here to avoid side effects.

# Fix known XWayland transient drag windows.
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Place hyprland-run helper in a known corner.
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Common dev tools behavior.
windowrule {
    name = float-desktop-helpers
    match:class = ^(pavucontrol|nm-connection-editor)$
    float = yes
}

# WS1/WS2 dev stacks: no float / no pixel scripts — Hyprland default tiling + gaps.

# WS6 monitoring grid (float and place via helper script).
windowrule {
    name = ws6-monitoring-grid
    match:class = ^(ws6-btop|ws6-nvtop|ws6-iftop|ws6-shell)$
    match:workspace = 6
    float = yes
}
