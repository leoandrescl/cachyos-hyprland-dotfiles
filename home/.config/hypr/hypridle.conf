general {
    lock_cmd = pidof hyprlock >/dev/null || hyprlock
    before_sleep_cmd = ~/.config/hypr/scripts/hypridle-before-sleep.sh
    after_sleep_cmd = hyprctl dispatch dpms on
    # If true, Chrome/mpv/etc. cannot block suspend via idle inhibitors.
    ignore_dbus_inhibit = true
}

listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

listener {
    timeout = 1800
    on-timeout = systemctl suspend --check-inhibitors=no
}
