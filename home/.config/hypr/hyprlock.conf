# hyprlock - estilo minimal/glass inspirado en macOS

general {
    disable_loading_bar = true
    hide_cursor = false
    grace = 0
}

background {
    monitor =
    path = /usr/share/hypr/wall0.png
    blur_passes = 3
    blur_size = 7
    noise = 0.015
    contrast = 0.95
    brightness = 0.82
    vibrancy = 0.18
    vibrancy_darkness = 0.2
}

# Hora principal
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(FFFFFFFF)
    font_size = 110
    font_family = Inter
    position = 0, 220
    halign = center
    valign = center
}

# Fecha
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A %d %B")"
    color = rgba(E6E6E6FF)
    font_size = 28
    font_family = Inter
    position = 0, 150
    halign = center
    valign = center
}

# Usuario
label {
    monitor =
    text = $USER
    color = rgba(D1D1D6FF)
    font_size = 20
    font_family = Inter
    position = 0, 84
    halign = center
    valign = center
}

# Campo de password con estilo glass
input-field {
    monitor =
    size = 520, 64
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.16
    dots_center = true
    outer_color = rgba(FFFFFF99)
    inner_color = rgba(1A1D22AA)
    font_color = rgba(FFFFFFFF)
    fade_on_empty = false
    placeholder_text = <span foreground="##C7C7CC">Password...</span>
    hide_input = false
    check_color = rgba(30D158FF)
    fail_color = rgba(FF453AFF)
    fail_text = <span foreground="##FFB4B4">Authentication failed</span>
    capslock_color = rgba(FFD60AFF)
    position = 0, -10
    halign = center
    valign = center
}

# Acciones rápidas abajo (similares a login screen)
label {
    monitor =
    text = <span foreground="##F5F5F7">[E] Logout   [R] Reboot   [S] Suspend   [H] Hibernate</span>
    color = rgba(F5F5F7FF)
    font_size = 16
    font_family = Inter
    position = 0, -260
    halign = center
    valign = center
}

# Teclas de acción
bind {
    key = E
    action = exec, hyprctl dispatch exit
}

bind {
    key = R
    action = exec, systemctl reboot
}

bind {
    key = S
    action = exec, systemctl suspend
}

bind {
    key = H
    action = exec, systemctl hibernate
}
